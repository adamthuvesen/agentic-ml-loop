<script>
// === room.js ===
// Room rendering — Deep Space Command theme

const TILE = 40;
const ROOM_W = 15;
const ROOM_H = 10;

const COLORS = {
  floor: '#2a2640',
  floorAlt: '#262338',
  wall: '#1a1535',
  wallTop: '#110e22',
  baseboard: '#2d2845',
  baseboardHighlight: '#3d3860',
  desk: '#3a3555',
  deskTop: '#332f4e',
  deskShadow: '#252040',
  deskHighlight: '#4a4570',
  monitor: '#0d0b18',
  monitorScreen: '#40e8a0',
  bookshelf: '#4a3860',
  bookshelfFrame: '#3a2850',
  bookshelfShadow: '#2d1f40',
  bookshelfHighlight: '#5a4870',
  bookRed: '#e74c3c',
  bookBlue: '#3498db',
  bookGreen: '#2ecc71',
  bookYellow: '#f1c40f',
  whiteboard: '#e8ecf0',
  whiteboardBorder: '#5a5475',
  labDesk: '#353050',
  labDeskShadow: '#2a2540',
  labDeskHighlight: '#454070',
  labScreen: '#40e8a0',
  labelBg: 'rgba(10, 8, 20, 0.7)',
  labelText: '#ecf0f1',
};

// Clockwise circuit: Desk(left) → Library(top) → Lab(right) → WB(bottom)
const STATIONS = {
  desk:       { x: 1,  y: 4, w: 2, h: 2, stand: [3, 5] },
  library:    { x: 6,  y: 0, w: 3, h: 2, stand: [7, 2] },
  lab:        { x: 11, y: 5, w: 2, h: 2, stand: [10, 6] },
  whiteboard: { x: 5,  y: 7, w: 4, h: 2, stand: [7, 6] },
  center:     { x: 7,  y: 4, w: 1, h: 1, stand: [7, 4] },
};

// Subtle per-tile noise
const _tileNoise = [];
(function () {
  let seed = 42;
  for (let i = 0; i < ROOM_W * ROOM_H; i++) {
    seed = (seed * 16807 + 0) % 2147483647;
    _tileNoise.push((seed / 2147483647 - 0.5) * 0.04);
  }
})();

function _adjustBrightness(hex, factor) {
  const r = Math.min(255, Math.max(0, Math.round(parseInt(hex.slice(1, 3), 16) * (1 + factor))));
  const g = Math.min(255, Math.max(0, Math.round(parseInt(hex.slice(3, 5), 16) * (1 + factor))));
  const b = Math.min(255, Math.max(0, Math.round(parseInt(hex.slice(5, 7), 16) * (1 + factor))));
  return `rgb(${r},${g},${b})`;
}

function isWall(tx, ty) {
  return tx === 0 || ty === 0 || tx === ROOM_W - 1 || ty === ROOM_H - 1;
}

function isWalkable(tx, ty) {
  if (tx < 0 || ty < 0 || tx >= ROOM_W || ty >= ROOM_H) return false;
  if (isWall(tx, ty)) return false;
  for (const s of Object.values(STATIONS)) {
    if (s.w === 0 && s.h === 0) continue;
    if (tx >= s.x && tx < s.x + s.w && ty >= s.y && ty < s.y + s.h) return false;
  }
  return true;
}

function drawFloor(ctx) {
  for (let y = 0; y < ROOM_H; y++) {
    for (let x = 0; x < ROOM_W; x++) {
      const noise = _tileNoise[y * ROOM_W + x];
      if (isWall(x, y)) {
        const wallBase = y === 0 ? COLORS.wallTop : COLORS.wall;
        ctx.fillStyle = _adjustBrightness(wallBase, noise);
      } else {
        const base = (x + y) % 2 === 0 ? COLORS.floor : COLORS.floorAlt;
        ctx.fillStyle = _adjustBrightness(base, noise);
      }
      ctx.fillRect(x * TILE, y * TILE, TILE, TILE);
    }
  }
  // Baseboard
  ctx.fillStyle = COLORS.baseboard;
  ctx.fillRect(TILE, TILE, (ROOM_W - 2) * TILE, 2);
  ctx.fillRect(TILE, (ROOM_H - 1) * TILE - 2, (ROOM_W - 2) * TILE, 2);
  ctx.fillRect(TILE, TILE, 2, (ROOM_H - 2) * TILE);
  ctx.fillRect((ROOM_W - 1) * TILE - 2, TILE, 2, (ROOM_H - 2) * TILE);
  // Highlight
  ctx.fillStyle = COLORS.baseboardHighlight;
  ctx.fillRect(TILE, TILE, (ROOM_W - 2) * TILE, 1);
  ctx.fillRect(TILE, TILE, 1, (ROOM_H - 2) * TILE);
}

function _drawGlow(ctx, cx, cy, radius, color) {
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
  grad.addColorStop(0, color);
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(cx - radius, cy - radius, radius * 2, radius * 2);
}

function _drawScanlines(ctx, x, y, w, h) {
  const tick = window.globalTick || 0;
  const offset = Math.floor(tick / 4) % 4;
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  for (let ly = offset; ly < h; ly += 4) {
    ctx.fillRect(x, y + ly, w, 1);
  }
}

// ─── Set Dressing ───────────────────────────────────────────────

function drawSetDressing(ctx) {
  const tick = window.globalTick || 0;

  // Command ring in center — visible but not distracting
  const cx = 7.5 * TILE, cy = 4.5 * TILE;
  ctx.strokeStyle = 'rgba(100, 80, 180, 0.12)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(cx, cy, 55, 0, Math.PI * 2);
  ctx.stroke();
  ctx.strokeStyle = 'rgba(100, 80, 180, 0.08)';
  ctx.beginPath();
  ctx.arc(cx, cy, 45, 0, Math.PI * 2);
  ctx.stroke();
  // Cross lines + diagonal ticks
  ctx.strokeStyle = 'rgba(100, 80, 180, 0.07)';
  ctx.beginPath();
  ctx.moveTo(cx - 55, cy); ctx.lineTo(cx + 55, cy);
  ctx.moveTo(cx, cy - 55); ctx.lineTo(cx, cy + 55);
  ctx.stroke();
  // Rotating tick on the ring
  const ringAngle = tick * 0.015;
  ctx.fillStyle = 'rgba(100, 80, 220, 0.2)';
  ctx.fillRect(
    cx + Math.cos(ringAngle) * 50 - 1,
    cy + Math.sin(ringAngle) * 50 - 1,
    3, 3
  );

  // Floor path circuit — dashed connecting stations
  ctx.strokeStyle = 'rgba(100, 80, 180, 0.1)';
  ctx.lineWidth = 1;
  ctx.setLineDash([6, 8]);
  const pathPoints = [
    [3 * TILE + 20, 5 * TILE + 20],   // desk stand
    [7 * TILE + 20, 2 * TILE + 20],   // library stand
    [10 * TILE + 20, 6 * TILE + 20],  // lab stand
    [7 * TILE + 20, 6 * TILE + 20],   // whiteboard stand
  ];
  ctx.beginPath();
  ctx.moveTo(pathPoints[0][0], pathPoints[0][1]);
  for (let i = 1; i < pathPoints.length; i++) {
    ctx.lineTo(pathPoints[i][0], pathPoints[i][1]);
  }
  ctx.lineTo(pathPoints[0][0], pathPoints[0][1]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Small arrow markers along the path (clockwise direction indicators)
  for (let i = 0; i < pathPoints.length; i++) {
    const [ax, ay] = pathPoints[i];
    const [bx, by] = pathPoints[(i + 1) % pathPoints.length];
    const mx = (ax + bx) / 2, my = (ay + by) / 2;
    ctx.fillStyle = 'rgba(100, 80, 220, 0.15)';
    ctx.beginPath();
    ctx.arc(mx, my, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Wall constellation dots — top wall + side walls
  const starSeed = [
    [4.2, 0.3], [4.8, 0.6], [5.1, 0.2], [9.5, 0.4], [10.1, 0.7],
    [10.8, 0.3], [11.2, 0.5], [11.8, 0.2], [3.5, 0.5], [12.5, 0.6],
    [2.2, 0.4], [13.5, 0.3], [1.5, 0.7], [8.3, 0.15],
    // Side wall stars
    [0.3, 3.2], [0.6, 5.8], [0.2, 7.3],
    [14.3, 2.5], [14.7, 4.8], [14.4, 7.6],
  ];
  for (const [sx, sy] of starSeed) {
    const brightness = 0.2 + Math.sin(tick * 0.02 + sx * 3) * 0.1;
    ctx.fillStyle = `rgba(180, 200, 255, ${brightness})`;
    const size = sy < 1 ? 1.5 : 1; // top wall stars slightly bigger
    ctx.fillRect(Math.round(sx * TILE), Math.round(sy * TILE), size, size);
  }

  // Left wall — small clock
  const clockX = 1 * TILE + 20, clockY = 2 * TILE + 20;
  ctx.strokeStyle = 'rgba(140, 120, 200, 0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(clockX, clockY, 10, 0, Math.PI * 2);
  ctx.stroke();
  // Hour markers
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2;
    ctx.fillStyle = 'rgba(140, 120, 200, 0.2)';
    ctx.fillRect(clockX + Math.sin(a) * 8 - 0.5, clockY - Math.cos(a) * 8 - 0.5, 1, 1);
  }
  // Clock hands
  const minuteAngle = (tick * 0.01) % (Math.PI * 2);
  const hourAngle = minuteAngle / 12;
  ctx.strokeStyle = 'rgba(180, 160, 230, 0.35)';
  ctx.beginPath();
  ctx.moveTo(clockX, clockY);
  ctx.lineTo(clockX + Math.sin(hourAngle) * 5, clockY - Math.cos(hourAngle) * 5);
  ctx.stroke();
  ctx.strokeStyle = 'rgba(200, 180, 240, 0.4)';
  ctx.beginPath();
  ctx.moveTo(clockX, clockY);
  ctx.lineTo(clockX + Math.sin(minuteAngle) * 8, clockY - Math.cos(minuteAngle) * 8);
  ctx.stroke();

  // Right wall — small status display
  const dpX = 13 * TILE + 10, dpY = 2 * TILE + 10;
  ctx.fillStyle = 'rgba(40, 30, 70, 0.5)';
  ctx.fillRect(dpX, dpY, 22, 16);
  ctx.strokeStyle = 'rgba(100, 80, 160, 0.35)';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(dpX, dpY, 22, 16);
  // Blinking dot
  const blink = Math.sin(tick * 0.1) > 0;
  if (blink) {
    ctx.fillStyle = '#40e8a0';
    ctx.fillRect(dpX + 16, dpY + 3, 3, 3);
    _drawGlow(ctx, dpX + 17.5, dpY + 4.5, 8, 'rgba(64, 232, 160, 0.15)');
  }
  // Tiny bars
  ctx.fillStyle = 'rgba(64, 232, 160, 0.4)';
  ctx.fillRect(dpX + 3, dpY + 4, 9, 2);
  ctx.fillRect(dpX + 3, dpY + 8, 7, 2);
  ctx.fillRect(dpX + 3, dpY + 12, 5, 2);

  // Cable runs — connecting desk → center → lab
  ctx.strokeStyle = 'rgba(80, 60, 140, 0.18)';
  ctx.lineWidth = 1;
  // Desk → center
  ctx.beginPath();
  ctx.moveTo(3 * TILE, 5 * TILE + 30);
  ctx.lineTo(5.5 * TILE, 5 * TILE + 30);
  ctx.lineTo(6 * TILE, 4.5 * TILE);
  ctx.stroke();
  // Center → lab
  ctx.beginPath();
  ctx.moveTo(9 * TILE, 4.5 * TILE);
  ctx.lineTo(9.5 * TILE, 5 * TILE + 10);
  ctx.lineTo(11 * TILE, 5 * TILE + 10);
  ctx.stroke();
  // Desk → whiteboard (along bottom)
  ctx.strokeStyle = 'rgba(80, 60, 140, 0.12)';
  ctx.beginPath();
  ctx.moveTo(2 * TILE, 6 * TILE + 20);
  ctx.lineTo(2 * TILE, 7.5 * TILE);
  ctx.lineTo(5 * TILE, 7.5 * TILE);
  ctx.stroke();

  // Floor hex grid — very faint geometric pattern in center area
  ctx.strokeStyle = 'rgba(80, 60, 140, 0.04)';
  ctx.lineWidth = 0.5;
  for (let gx = 4; gx <= 10; gx++) {
    for (let gy = 3; gy <= 6; gy++) {
      const px = gx * TILE + 20, py = gy * TILE + 20;
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2 - Math.PI / 6;
        const hx = px + Math.cos(a) * 12;
        const hy = py + Math.sin(a) * 12;
        if (i === 0) ctx.moveTo(hx, hy);
        else ctx.lineTo(hx, hy);
      }
      ctx.closePath();
      ctx.stroke();
    }
  }
}

const _ambientMotes = [];
(function () {
  const moteColors = ['rgba(34,211,238,', 'rgba(180,140,255,', 'rgba(232,121,249,', 'rgba(251,191,36,', 'rgba(220,220,255,'];
  for (let i = 0; i < 18; i++) {
    _ambientMotes.push({
      x: Math.random() * ROOM_W * TILE,
      y: Math.random() * ROOM_H * TILE,
      vx: (Math.random() - 0.5) * 0.3,
      vy: -Math.random() * 0.2 - 0.1,
      size: 1 + Math.random(),
      colorBase: moteColors[Math.floor(Math.random() * moteColors.length)],
      alpha: 0.08 + Math.random() * 0.12,
      phase: Math.random() * Math.PI * 2,
    });
  }
})();

function drawAmbientMotes(ctx) {
  const tick = window.globalTick || 0;
  for (const m of _ambientMotes) {
    m.x += m.vx + Math.sin(tick * 0.02 + m.phase) * 0.15;
    m.y += m.vy;
    if (m.y < 0) { m.y = ROOM_H * TILE; m.x = Math.random() * ROOM_W * TILE; }
    if (m.x < 0) m.x = ROOM_W * TILE;
    if (m.x > ROOM_W * TILE) m.x = 0;
    const pulse = 0.7 + 0.3 * Math.sin(tick * 0.04 + m.phase);
    ctx.fillStyle = m.colorBase + (m.alpha * pulse).toFixed(3) + ')';
    ctx.fillRect(Math.round(m.x), Math.round(m.y), m.size, m.size);
  }
}

// ─── Labels & Room Draw ─────────────────────────────────────────

function drawStationLabels(ctx) {
  const labels = { desk: 'Desk', whiteboard: 'Scoreboard', library: 'Library', lab: 'Lab' };
  ctx.font = '11px monospace';
  ctx.textAlign = 'center';
  for (const [key, label] of Object.entries(labels)) {
    const s = STATIONS[key];
    const cx = (s.x + s.w / 2) * TILE;
    const atTop = (key === 'library');
    const cy = atTop ? (s.y + s.h + 0.2) * TILE : (s.y - 0.3) * TILE;
    const tw = ctx.measureText(label).width;
    ctx.fillStyle = COLORS.labelBg;
    ctx.fillRect(cx - tw / 2 - 6, cy - 10, tw + 12, 17);
    ctx.fillStyle = COLORS.labelText;
    ctx.fillText(label, cx, cy + 3);
  }
}

function drawRoom(ctx) {
  drawFloor(ctx);
  drawSetDressing(ctx);
  drawDesk(ctx);
  drawWhiteboard(ctx);
  drawLibrary(ctx);
  drawLab(ctx);
  drawAmbientMotes(ctx);
  drawStationLabels(ctx);
}

// BFS pathfinding
function findPath(sx, sy, tx, ty) {
  if (sx === tx && sy === ty) return [];
  const visited = new Set();
  const queue = [[sx, sy, []]];
  visited.add(`${sx},${sy}`);
  const dirs = [[0,-1],[0,1],[-1,0],[1,0]];
  while (queue.length > 0) {
    const [cx, cy, path] = queue.shift();
    for (const [dx, dy] of dirs) {
      const nx = cx + dx, ny = cy + dy;
      const key = `${nx},${ny}`;
      if (visited.has(key)) continue;
      if (!isWalkable(nx, ny) && !(nx === tx && ny === ty)) continue;
      const newPath = [...path, [nx, ny]];
      if (nx === tx && ny === ty) return newPath;
      visited.add(key);
      queue.push([nx, ny, newPath]);
    }
  }
  return [[tx, ty]];
}

  [DIR_UP]:    [SPRITE_UP_0, SPRITE_UP_0, SPRITE_UP_0, SPRITE_UP_0],
  [DIR_LEFT]:  [SPRITE_LEFT_0, SPRITE_LEFT_1, SPRITE_LEFT_0, SPRITE_LEFT_1],
  [DIR_RIGHT]: null,
};

const SPRITE_SCALE = 2.5;

function drawSprite(ctx, sprite, px, py, mirror) {
  for (let r = 0; r < 16; r++) {
    for (let c = 0; c < 16; c++) {
      const val = sprite[r][mirror ? 15 - c : c];
      if (val === 0) continue;
      ctx.fillStyle = PALETTE[val];
      const sx = Math.round(px + c * SPRITE_SCALE);
      const sy = Math.round(py + r * SPRITE_SCALE);
      const sw = Math.round(px + (c + 1) * SPRITE_SCALE) - sx;
      const sh = Math.round(py + (r + 1) * SPRITE_SCALE) - sy;
      ctx.fillRect(sx, sy, sw, sh);
    }
  }
}

const CharState = {
  IDLE: 'idle',
  WALK: 'walk',
  READ: 'read',
  TYPE: 'type',
  WRITE: 'write',
  THINK: 'think',
  DANCE: 'dance',
};

class Character {
  constructor(tileX, tileY) {
    this.tileX = tileX;
    this.tileY = tileY;
    this.pixelX = tileX * TILE;
    this.pixelY = tileY * TILE;
    this.dir = DIR_DOWN;
    this.state = CharState.IDLE;
    this.frame = 0;
    this.frameTick = 0;
    this.path = [];
    this.targetTile = null;
    this.onArrive = null;
    this.speechText = '';

    // Dance state
    this.danceTick = 0;
    this.danceBaseX = 0;
    this.danceBaseY = 0;
    this.danceCallback = null;
    this.danceSparkles = [];

    // Breathing
    this.breathTick = 0;

    // Teleport beam state
    this.isSpawning = false;
    this.isDeparting = false;
    this.teleportTick = 0;
    this.teleportDuration = 60;
    this.teleportCallback = null;
    this.teleportParticles = [];
    this.cycleIndex = 0;
    this.palette = [...BASE_PALETTE];
  }

  setPalette(cycleIndex) {
    this.cycleIndex = cycleIndex;
    const p = ROBOT_PALETTES[cycleIndex % ROBOT_PALETTES.length];
    this.palette = [...BASE_PALETTE];
    this.palette[3] = p.body;
    this.palette[6] = p.eyes;
    this.palette[7] = p.antenna;
    this.palette[8] = p.accent;
    PALETTE = this.palette;
  }

  startDepart(callback) {
    this.isDeparting = true;
    this.isSpawning = false;
    this.teleportTick = 0;
    this.teleportDuration = 60;
    this.teleportCallback = callback || null;
    this.teleportParticles = [];
    this.state = CharState.IDLE;
    this.speechText = 'My work here is done!';
    this.dir = DIR_DOWN;
  }

  startSpawn(callback) {
    this.isSpawning = true;
    this.isDeparting = false;
    this.teleportTick = 0;
    this.teleportDuration = 60;
    this.teleportCallback = callback || null;
    this.teleportParticles = [];
  }

  startDance(callback) {
    this.state = CharState.DANCE;
    this.danceTick = 0;
    this.danceBaseX = this.pixelX;
    this.danceBaseY = this.pixelY;
    this.danceCallback = callback || null;
    this.danceSparkles = [];
  }

  walkTo(tx, ty, callback) {
    this.path = findPath(this.tileX, this.tileY, tx, ty);
    this.targetTile = null;
    this.onArrive = callback || null;
    if (this.path.length === 0) {
      this.state = CharState.IDLE;
      if (this.onArrive) this.onArrive();
      return;
    }
    this.state = CharState.WALK;
    this._nextTileTarget();
  }

  _nextTileTarget() {
    if (this.path.length === 0) {
      this.state = CharState.IDLE;
      if (this.onArrive) {
        const cb = this.onArrive;
        this.onArrive = null;
        cb();
      }
      return;
    }
    this.targetTile = this.path.shift();
    const dx = this.targetTile[0] - this.tileX;
    const dy = this.targetTile[1] - this.tileY;
    if (dx > 0) this.dir = DIR_RIGHT;
    else if (dx < 0) this.dir = DIR_LEFT;
    else if (dy > 0) this.dir = DIR_DOWN;
    else if (dy < 0) this.dir = DIR_UP;
  }

  update(speed) {
    const spd = speed || 1;
    this.frameTick += spd;
    this.breathTick += spd;
    if (this.frameTick >= ANIM_FRAME_TICKS) {
      this.frameTick -= ANIM_FRAME_TICKS;
      this.frame = (this.frame + 1) % 4;
    }

    if (this.state === CharState.WALK && this.targetTile) {
      const tx = this.targetTile[0] * TILE;
      const ty = this.targetTile[1] * TILE;
      const dx = tx - this.pixelX;
      const dy = ty - this.pixelY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const walkSpeed = WALK_SPEED * spd;
      if (dist <= walkSpeed) {
        this.pixelX = tx;
        this.pixelY = ty;
        this.tileX = this.targetTile[0];
        this.tileY = this.targetTile[1];
        this._nextTileTarget();
      } else {
        this.pixelX += (dx / dist) * walkSpeed;
        this.pixelY += (dy / dist) * walkSpeed;
      }
    }

    if (this.state === CharState.DANCE) {
      this._updateDance(spd);
    }

    // Update teleport animation
    if (this.isDeparting || this.isSpawning) {
      this._updateTeleport(spd);
    }

    // Update sparkles
    for (const s of this.danceSparkles) {
      s.x += s.vx * spd;
      s.y += s.vy * spd;
      s.life -= spd;
    }
    this.danceSparkles = this.danceSparkles.filter(s => s.life > 0);

    // Update teleport particles
    for (const p of this.teleportParticles) {
      p.x += p.vx * spd;
      p.y += p.vy * spd;
      p.life -= spd;
    }
    this.teleportParticles = this.teleportParticles.filter(p => p.life > 0);
  }

  _updateTeleport(spd) {
    this.teleportTick += spd;
    const t = this.teleportTick;
    const dur = this.teleportDuration;
    const cx = this.pixelX + 20;
    const cy = this.pixelY + 20;

    if (this.isDeparting) {
      // Emit upward particles during dissolve phase (ticks 15-50)
      if (t >= 15 && t <= 50 && t % 2 === 0) {
        const colors = [this.palette[3], this.palette[6], this.palette[7], this.palette[8], '#fff'];
        for (let i = 0; i < 3; i++) {
          this.teleportParticles.push({
            x: cx + (Math.random() - 0.5) * 30,
            y: cy + 20 - (t - 15) / 35 * 40,
            vx: (Math.random() - 0.5) * 1.5,
            vy: -Math.random() * 2.5 - 1,
            life: 25 + Math.random() * 15,
            size: 1 + Math.random() * 2,
            color: colors[Math.floor(Math.random() * colors.length)],
          });
        }
      }

      if (t >= dur) {
        this.isDeparting = false;
        this.teleportTick = 0;
        if (this.teleportCallback) {
          const cb = this.teleportCallback;
          this.teleportCallback = null;
          cb();
        }
      }
    }

    if (this.isSpawning) {
      // Emit downward particles during materialize phase (ticks 10-45)
      if (t >= 10 && t <= 45 && t % 2 === 0) {
        const colors = [this.palette[3], this.palette[6], this.palette[7], this.palette[8], '#fff'];
        for (let i = 0; i < 3; i++) {
          this.teleportParticles.push({
            x: cx + (Math.random() - 0.5) * 30,
            y: cy - 20 + (t - 10) / 35 * 40,
            vx: (Math.random() - 0.5) * 1.5,
            vy: Math.random() * 1.5 + 0.5,
            life: 20 + Math.random() * 15,
            size: 1 + Math.random() * 2,
            color: colors[Math.floor(Math.random() * colors.length)],
          });
        }
      }

      // Arrival burst at tick 48
      if (t === 48) {
        const colors = [this.palette[3], this.palette[6], this.palette[7], this.palette[8]];
        for (let i = 0; i < 20; i++) {
          const angle = (Math.PI * 2 * i) / 20;
          const speed = 1.5 + Math.random() * 2;
          this.teleportParticles.push({
            x: cx,
            y: cy,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 25 + Math.random() * 15,
            size: 1.5 + Math.random() * 2,
            color: colors[Math.floor(Math.random() * colors.length)],
          });
        }
      }

      if (t >= dur) {
        this.isSpawning = false;
        this.teleportTick = 0;
        if (this.teleportCallback) {
          const cb = this.teleportCallback;
          this.teleportCallback = null;
          cb();
        }
      }
    }
  }

  _updateDance(spd) {
    this.danceTick += spd;
    const t = this.danceTick;

    if (t <= 15) {
      // Wiggle left-right
      const wiggle = (Math.floor(t / 4) % 2 === 0) ? -3 : 3;
      this.pixelX = this.danceBaseX + wiggle;
      this.dir = wiggle > 0 ? DIR_RIGHT : DIR_LEFT;
    } else if (t <= 30) {
      // Jump!
      this.pixelX = this.danceBaseX;
      const jumpPhase = t - 15;
      if (jumpPhase <= 7) {
        this.pixelY = this.danceBaseY - (jumpPhase / 7) * 8;
      } else {
        this.pixelY = this.danceBaseY - 8 + ((jumpPhase - 7) / 8) * 8;
      }
      this.dir = DIR_DOWN;
    } else if (t <= 60) {
      // Spin! Cycle directions
      this.pixelX = this.danceBaseX;
      this.pixelY = this.danceBaseY;
      const spinDirs = [DIR_DOWN, DIR_LEFT, DIR_UP, DIR_RIGHT];
      this.dir = spinDirs[Math.floor((t - 31) / 4) % 4];
    } else if (t <= 90) {
      // Settle with a little bounce
      this.dir = DIR_DOWN;
      const bounce = t - 60;
      if (bounce <= 8) {
        this.pixelY = this.danceBaseY - (bounce / 8) * 4;
      } else {
        this.pixelY = this.danceBaseY - 4 + ((bounce - 8) / 22) * 4;
      }
      this.pixelX = this.danceBaseX;
    }

    // Emit sparkles during dance
    if (t % 3 === 0) {
      const colors = [this.palette[7], this.palette[6], this.palette[3], '#fff'];
      this.danceSparkles.push({
        x: this.pixelX + 20 + (Math.random() - 0.5) * 30,
        y: this.pixelY + 10 + (Math.random() - 0.5) * 20,
        vx: (Math.random() - 0.5) * 2,
        vy: -Math.random() * 1.5 - 0.5,
        life: 20 + Math.random() * 15,
        size: 1 + Math.random() * 1.5,
        color: colors[Math.floor(Math.random() * colors.length)],
      });
    }

    // Dance done
    if (t >= 90) {
      this.pixelX = this.danceBaseX;
      this.pixelY = this.danceBaseY;
      this.dir = DIR_DOWN;
      this.state = CharState.IDLE;
      if (this.danceCallback) {
        const cb = this.danceCallback;
        this.danceCallback = null;
        cb();
      }
    }
  }

  draw(ctx) {
    const mirror = this.dir === DIR_RIGHT;
    const dirKey = mirror ? DIR_LEFT : this.dir;
    const frames = SPRITES[dirKey];
    if (!frames) return;

    const isDancing = this.state === CharState.DANCE;
    const isWalking = this.state === CharState.WALK;
    const animFrame = (isWalking || isDancing) ? this.frame % frames.length : 0;
    const sprite = frames[animFrame];

    let px = Math.round(this.pixelX);
    let py = Math.round(this.pixelY);

    // Breathing bob when idle at a station (not walking, not dancing, not teleporting)
    if (!isWalking && !isDancing && !this.isDeparting && !this.isSpawning) {
      const breathOffset = Math.sin(this.breathTick * Math.PI / 30) * 1.5;
      py += Math.round(breathOffset);
    }

    // Draw teleport beam behind the robot
    if (this.isDeparting || this.isSpawning) {
      this._drawTeleportBeam(ctx, px, py);
    }

    // Shadow oval (fade during teleport)
    const shadowAlpha = this.isDeparting
      ? Math.max(0, 1 - this.teleportTick / 40) * 0.2
      : this.isSpawning
        ? Math.min(1, this.teleportTick / 40) * 0.2
        : 0.2;
    ctx.fillStyle = `rgba(0, 0, 0, ${shadowAlpha})`;
    ctx.beginPath();
    ctx.ellipse(px + 20, Math.round(this.pixelY) + 38, 16, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    // Draw sprite with row masking during teleport
    if (this.isDeparting) {
      const progress = Math.max(0, (this.teleportTick - 15) / 35); // dissolve from tick 15-50
      this._drawSpriteWithDissolve(ctx, sprite, px, py, mirror, progress, 'up');
    } else if (this.isSpawning) {
      const progress = Math.max(0, Math.min(1, (this.teleportTick - 8) / 37)); // materialize from tick 8-45
      this._drawSpriteWithDissolve(ctx, sprite, px, py, mirror, progress, 'down');
    } else {
      drawSprite(ctx, sprite, px, py, mirror);
    }

    // Eye glow effect (bloom) — skip when fully dissolved
    if (!(this.isDeparting && this.teleportTick > 45) && !(this.isSpawning && this.teleportTick < 15)) {
      this._drawEyeGlow(ctx, px, py, mirror);
    }

    // Antenna pulse — skip when fully dissolved
    if (!(this.isDeparting && this.teleportTick > 45) && !(this.isSpawning && this.teleportTick < 15)) {
      this._drawAntennaPulse(ctx, px, py, mirror);
    }

    // Dance sparkles
    this._drawSparkles(ctx);

    // Teleport particles (drawn on top)
    this._drawTeleportParticles(ctx);

    // Speech bubble
    if (this.speechText && !isWalking) {
      this._drawSpeechBubble(ctx, px, py);
    }
  }

  _drawSpriteWithDissolve(ctx, sprite, px, py, mirror, progress, direction) {
    // progress: 0 = fully visible, 1 = fully dissolved
    const clampedProgress = Math.max(0, Math.min(1, progress));
    for (let r = 0; r < 16; r++) {
      // 'up' = dissolve bottom-to-top: bottom rows vanish first
      // 'down' = materialize top-to-bottom: top rows appear first
      let rowVisible;
      if (direction === 'up') {
        // Row 15 disappears first, row 0 last
        const rowThreshold = (15 - r) / 16;
        rowVisible = clampedProgress < rowThreshold + 0.0625;
      } else {
        // Row 0 appears first, row 15 last
        const rowThreshold = r / 16;
        rowVisible = clampedProgress > rowThreshold - 0.0625;
      }
      if (!rowVisible) continue;

      // Edge rows get partial alpha for smooth transition
      let rowAlpha = 1;
      if (direction === 'up') {
        const rowNorm = (15 - r) / 16;
        const edge = clampedProgress - rowNorm;
        if (edge > -0.1 && edge < 0.0625) rowAlpha = Math.max(0.2, 1 - (edge + 0.1) * 5);
      } else {
        const rowNorm = r / 16;
        const edge = rowNorm - clampedProgress;
        if (edge > -0.1 && edge < 0.0625) rowAlpha = Math.max(0.2, 1 - (edge + 0.1) * 5);
      }

      if (rowAlpha < 1) ctx.globalAlpha = rowAlpha;
      for (let c = 0; c < 16; c++) {
        const val = sprite[r][mirror ? 15 - c : c];
        if (val === 0) continue;
        ctx.fillStyle = this.palette[val];
        const sx = Math.round(px + c * SPRITE_SCALE);
        const sy = Math.round(py + r * SPRITE_SCALE);
        const sw = Math.round(px + (c + 1) * SPRITE_SCALE) - sx;
        const sh = Math.round(py + (r + 1) * SPRITE_SCALE) - sy;
        ctx.fillRect(sx, sy, sw, sh);
      }
      if (rowAlpha < 1) ctx.globalAlpha = 1;
    }
  }

  _drawTeleportBeam(ctx, px, py) {
    const t = this.teleportTick;
    const cx = px + 20;
    const eyeColor = this.palette[6];

    // Parse eye color for rgba
    const rgb = this._hexToRgb(eyeColor);

    let beamAlpha, beamWidth;
    if (this.isDeparting) {
      // Beam: fade in ticks 8-18, full 18-48, fade out 48-60
      if (t < 8) { beamAlpha = 0; beamWidth = 0; }
      else if (t < 18) { beamAlpha = (t - 8) / 10 * 0.7; beamWidth = 4 + (t - 8) / 10 * 20; }
      else if (t < 48) { beamAlpha = 0.7; beamWidth = 24 + Math.sin(t * 0.15) * 4; }
      else { beamAlpha = (1 - (t - 48) / 12) * 0.7; beamWidth = 24 * (1 - (t - 48) / 12); }
    } else {
      // Spawn beam: fade in ticks 0-10, full 10-48, fade out 48-60
      if (t < 10) { beamAlpha = t / 10 * 0.7; beamWidth = 4 + t / 10 * 20; }
      else if (t < 48) { beamAlpha = 0.7; beamWidth = 24 + Math.sin(t * 0.15) * 4; }
      else { beamAlpha = (1 - (t - 48) / 12) * 0.7; beamWidth = 24 * (1 - (t - 48) / 12); }
    }

    if (beamAlpha <= 0 || beamWidth <= 0) return;

    ctx.save();
    ctx.globalCompositeOperation = 'lighter';

    // Main beam gradient (vertical column)
    const beamGrad = ctx.createLinearGradient(cx - beamWidth / 2, 0, cx + beamWidth / 2, 0);
    beamGrad.addColorStop(0, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0)`);
    beamGrad.addColorStop(0.3, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${beamAlpha * 0.4})`);
    beamGrad.addColorStop(0.5, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${beamAlpha})`);
    beamGrad.addColorStop(0.7, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${beamAlpha * 0.4})`);
    beamGrad.addColorStop(1, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0)`);

    ctx.fillStyle = beamGrad;
    ctx.fillRect(cx - beamWidth / 2, 0, beamWidth, CANVAS_H);

    // Inner bright core
    const coreW = beamWidth * 0.3;
    ctx.fillStyle = `rgba(255, 255, 255, ${beamAlpha * 0.5})`;
    ctx.fillRect(cx - coreW / 2, 0, coreW, CANVAS_H);

    // Scanning ring effect at robot position
    const ringY = this.isDeparting
      ? py + 40 - (Math.max(0, t - 15) / 35) * 50
      : py + 40 - 50 + (Math.max(0, t - 8) / 37) * 50;
    const ringAlpha = beamAlpha * 0.6;
    ctx.strokeStyle = `rgba(255, 255, 255, ${ringAlpha})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(cx, ringY, beamWidth * 0.6, 3, 0, 0, Math.PI * 2);
    ctx.stroke();

    ctx.restore();
  }

  _drawTeleportParticles(ctx) {
    for (const p of this.teleportParticles) {
      ctx.globalAlpha = Math.min(1, p.life / 12);
      ctx.fillStyle = p.color;
      ctx.fillRect(Math.round(p.x), Math.round(p.y), p.size, p.size);
    }
    ctx.globalAlpha = 1;
  }

  _hexToRgb(hex) {
    const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return result ? {
      r: parseInt(result[1], 16),
      g: parseInt(result[2], 16),
      b: parseInt(result[3], 16),
    } : { r: 34, g: 211, b: 238 }; // fallback cyan
  }

  _drawEyeGlow(ctx, px, py, mirror) {
    const tick = window.globalTick || 0;
    const pulse = 0.6 + 0.4 * Math.sin(tick * 0.08);
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';

    const eyeScale = SPRITE_SCALE;
    const leftEyeX = px + (mirror ? 9 : 5) * eyeScale + eyeScale;
    const rightEyeX = px + (mirror ? 5 : 9) * eyeScale + eyeScale;
    const eyeY = py + 4.5 * eyeScale + eyeScale;

    const glowRadius = 8;
    const alpha = 0.12 * pulse;
    const rgb = this._hexToRgb(this.palette[6]);

    for (const ex of [leftEyeX, rightEyeX]) {
      const grad = ctx.createRadialGradient(ex, eyeY, 0, ex, eyeY, glowRadius);
      grad.addColorStop(0, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${alpha})`);
      grad.addColorStop(1, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0)`);
      ctx.fillStyle = grad;
      ctx.fillRect(ex - glowRadius, eyeY - glowRadius, glowRadius * 2, glowRadius * 2);
    }

    ctx.restore();
  }

  _drawAntennaPulse(ctx, px, py, mirror) {
    const tick = window.globalTick || 0;
    const pulse = 0.5 + 0.5 * Math.sin(tick * 0.05);
    const ax = px + (mirror ? 8 : 7) * SPRITE_SCALE + SPRITE_SCALE / 2;
    const ay = py + 0.5 * SPRITE_SCALE;

    const rgb = this._hexToRgb(this.palette[7]);
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const grad = ctx.createRadialGradient(ax, ay, 0, ax, ay, 6);
    grad.addColorStop(0, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${0.2 * pulse})`);
    grad.addColorStop(1, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0)`);
    ctx.fillStyle = grad;
    ctx.fillRect(ax - 6, ay - 6, 12, 12);
    ctx.restore();
  }

  _drawSparkles(ctx) {
    for (const s of this.danceSparkles) {
      ctx.globalAlpha = Math.min(1, s.life / 10);
      ctx.fillStyle = s.color;
      ctx.fillRect(Math.round(s.x), Math.round(s.y), s.size, s.size);
    }
    ctx.globalAlpha = 1;
  }

  _drawSpeechBubble(ctx, px, py) {
    const cx = px + 20;
    const by = py - 6;

    ctx.font = '9px monospace';
    const tw = ctx.measureText(this.speechText).width;
    const padX = 6, padY = 4;
    const bw = tw + padX * 2;
    const bh = 14 + padY * 2;
    const bx = cx - bw / 2;
    const bubbleY = by - bh;

    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    roundRect(ctx, bx, bubbleY, bw, bh, 4);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 0.5;
    roundRect(ctx, bx, bubbleY, bw, bh, 4);
    ctx.stroke();

    // Triangle pointer
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    ctx.beginPath();
    ctx.moveTo(cx - 4, by);
    ctx.lineTo(cx + 4, by);
    ctx.lineTo(cx, by + 5);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#333';
    ctx.textAlign = 'center';
    ctx.fillText(this.speechText, cx, bubbleY + bh / 2 + 3);
    ctx.textAlign = 'left';
  }
}


// === sound.js ===
// Retro sound effects — Web Audio API chiptune synthesis (no external files)

const SFX = (function () {
  'use strict';

  let ctx = null;
  let muted = false;
  const MASTER_VOL = 0.18;

  function _ctx() {
    if (!ctx) {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return ctx;
  }

  // Resume context on first user interaction (browser autoplay policy)
  function _ensureResumed() {
    const ac = _ctx();
    if (ac.state === 'suspended') ac.resume();
  }

  function _osc(type, freq, duration, volume, detune) {
    if (muted) return;
    _ensureResumed();
    const ac = _ctx();
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = type;
    o.frequency.value = freq;
    if (detune) o.detune.value = detune;
    g.gain.setValueAtTime(volume * MASTER_VOL, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
    o.connect(g);
    g.connect(ac.destination);
    o.start(ac.currentTime);
    o.stop(ac.currentTime + duration);
    return { osc: o, gain: g };
  }

  // ─── Sound effects ───────────────────────────────────────────

  function walk() {
    // Soft footstep blip
    _osc('square', 180 + Math.random() * 40, 0.06, 0.3);
  }

  function arrive() {
    // Two-tone arrival chime
    _osc('square', 440, 0.08, 0.5);
    setTimeout(() => _osc('square', 660, 0.12, 0.5), 80);
  }

  function speech() {
    // Typewriter-style speech blip (Undertale vibes)
    const base = 260 + Math.random() * 80;
    _osc('square', base, 0.04, 0.35);
  }

  function sceneTransition() {
    // Swoosh — descending noise burst
    if (muted) return;
    _ensureResumed();
    const ac = _ctx();
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(800, ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(200, ac.currentTime + 0.15);
    g.gain.setValueAtTime(0.12 * MASTER_VOL, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.15);
    o.connect(g);
    g.connect(ac.destination);
    o.start();
    o.stop(ac.currentTime + 0.15);
  }

  function hypothesis() {
    // Curious rising arpeggio
    const notes = [330, 440, 550, 660];
    notes.forEach((f, i) => {
      setTimeout(() => _osc('square', f, 0.1, 0.4), i * 60);
    });
  }

  function training() {
    // Rapid beep-boop computing sounds
    for (let i = 0; i < 4; i++) {
      setTimeout(() => {
        _osc('square', 200 + Math.random() * 600, 0.05, 0.25);
      }, i * 70);
    }
  }

  function evaluation() {
    // Drumroll-ish anticipation
    for (let i = 0; i < 6; i++) {
      setTimeout(() => {
        _osc('square', 220, 0.03, 0.2 + i * 0.05);
      }, i * 50);
    }
    // Final reveal note
    setTimeout(() => _osc('triangle', 523, 0.3, 0.5), 350);
  }

  function newBest() {
    // Victory fanfare! Rising major arpeggio
    const notes = [523, 659, 784, 1047];
    notes.forEach((f, i) => {
      setTimeout(() => {
        _osc('square', f, 0.2, 0.5);
        _osc('square', f * 0.5, 0.2, 0.2); // octave below for thickness
      }, i * 100);
    });
    // Sparkle on top
    setTimeout(() => _osc('square', 1319, 0.4, 0.3), 450);
  }

  function depart() {
    // Teleport out — descending sweep
    if (muted) return;
    _ensureResumed();
    const ac = _ctx();
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = 'square';
    o.frequency.setValueAtTime(880, ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(110, ac.currentTime + 0.4);
    g.gain.setValueAtTime(0.3 * MASTER_VOL, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.4);
    o.connect(g);
    g.connect(ac.destination);
    o.start();
    o.stop(ac.currentTime + 0.4);
  }

  function spawn() {
    // Teleport in — ascending sweep + chime
    if (muted) return;
    _ensureResumed();
    const ac = _ctx();
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = 'square';
    o.frequency.setValueAtTime(110, ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(880, ac.currentTime + 0.3);
    g.gain.setValueAtTime(0.3 * MASTER_VOL, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.35);
    o.connect(g);
    g.connect(ac.destination);
    o.start();
    o.stop(ac.currentTime + 0.35);
    // Arrival chime
    setTimeout(() => {
      _osc('triangle', 880, 0.15, 0.4);
      _osc('triangle', 1100, 0.2, 0.3);
    }, 300);
  }

  function finale() {
    // Epic ending — full major chord + sweep
    const chord = [523, 659, 784];
    chord.forEach(f => {
      _osc('square', f, 0.6, 0.35);
      _osc('triangle', f, 0.8, 0.2);
    });
    // Rising sparkle
    setTimeout(() => {
      [1047, 1175, 1319, 1568].forEach((f, i) => {
        setTimeout(() => _osc('square', f, 0.15, 0.25), i * 80);
      });
    }, 400);
  }

  function intro() {
    // Boot-up sequence
    _osc('square', 220, 0.08, 0.3);
    setTimeout(() => _osc('square', 330, 0.08, 0.3), 100);
    setTimeout(() => _osc('square', 440, 0.15, 0.4), 200);
    setTimeout(() => _osc('triangle', 660, 0.25, 0.35), 350);
  }

  function toggleMute() {
    muted = !muted;
    return muted;
  }

  return {
    walk,
    arrive,
    speech,
    sceneTransition,
    hypothesis,
    training,
    evaluation,
    newBest,
    depart,
    spawn,
    finale,
    intro,
    toggleMute,
    get muted() { return muted; },
  };
})();


// === ui.js ===
// UI — text overlays, leaderboard panel, playback controls, progress bar, summary

const UI_FONT = '12px monospace';
const UI_FONT_TITLE = 'bold 15px monospace';
const UI_FONT_SMALL = '10px monospace';
const CANVAS_W = 600;
const CANVAS_H = 400;

// ─── Shared panel drawing with glass effect ─────────────────────

function _drawPanel(ctx, x, y, w, h, radius) {
  // Background with subtle vertical gradient
  const grad = ctx.createLinearGradient(x, y, x, y + h);
  grad.addColorStop(0, 'rgba(20, 16, 40, 0.94)');
  grad.addColorStop(1, 'rgba(12, 10, 25, 0.96)');
  ctx.fillStyle = grad;
  roundRect(ctx, x, y, w, h, radius);
  ctx.fill();
  // Border
  ctx.strokeStyle = 'rgba(80, 60, 140, 0.5)';
  ctx.lineWidth = 1;
  roundRect(ctx, x, y, w, h, radius);
  ctx.stroke();
  // Inner glass highlight at top
  ctx.fillStyle = 'rgba(255, 255, 255, 0.06)';
  ctx.fillRect(x + 2, y + 1, w - 4, 1);
}

// ─── Text Overlay ───────────────────────────────────────────────

class TextOverlay {
  constructor() {
    this.visible = false;
    this.title = '';
    this.text = '';
    this.subtitle = '';
    this.findings = [];
    this.candidates = [];
    this.alpha = 0;
    this.targetAlpha = 0;
  }

  show(scene) {
    this.title = scene.title || '';
    this.text = scene.text || '';
    this.subtitle = scene.subtitle || '';
    this.findings = scene.findings || [];
    this.candidates = scene.candidates || [];
    this.visible = true;
    this.targetAlpha = 1;
  }

  hide() {
    this.targetAlpha = 0;
  }

  update(speed) {
    const step = 0.08 * (speed || 1);
    if (this.targetAlpha > this.alpha) {
      this.alpha = Math.min(1, this.alpha + step);
    } else if (this.targetAlpha < this.alpha) {
      this.alpha = Math.max(0, this.alpha - step);
      if (this.alpha === 0) this.visible = false;
    }
  }

  draw(ctx) {
    if (!this.visible || this.alpha <= 0) return;
    ctx.globalAlpha = this.alpha;

    const pad = 12;
    const x = 10;
    const maxW = 340;
    const controlsH = 32;
    const maxBottom = CANVAS_H - controlsH - 6;
    const lineH = 14;
    const titleLineH = 17;

    ctx.font = UI_FONT_TITLE;
    const titleLines = wrapText(ctx, this.title, maxW - pad * 2, 2);

    let contentH = pad * 2;
    contentH += titleLines.length * titleLineH;
    if (this.subtitle) contentH += lineH;
    ctx.font = UI_FONT;
    let textLines = [];
    if (this.text) {
      textLines = wrapText(ctx, this.text, maxW - pad * 2, 3);
      contentH += textLines.length * lineH + 4;
    }
    ctx.font = UI_FONT_SMALL;
    let findingsLines = [];
    for (const f of this.findings) {
      findingsLines.push(...wrapText(ctx, '• ' + f, maxW - pad * 2 - 4, 2));
    }
    if (findingsLines.length) contentH += findingsLines.length * 12 + 4;
    const candCount = Math.min(this.candidates.length, 4);
    if (candCount) contentH += candCount * 12 + 4;

    const maxH = maxBottom - 10;
    if (contentH > maxH) contentH = maxH;

    let y = maxBottom - contentH;
    if (y < 10) y = 10;

    _drawPanel(ctx, x, y, maxW, contentH, 5);

    // Clip to box
    ctx.save();
    ctx.beginPath();
    ctx.rect(x, y, maxW, contentH);
    ctx.clip();

    let ty = y + pad + 12;

    // Title
    ctx.fillStyle = '#f1c40f';
    ctx.font = UI_FONT_TITLE;
    ctx.textAlign = 'left';
    for (const line of titleLines) {
      ctx.fillText(line, x + pad, ty);
      ty += titleLineH;
    }

    if (this.subtitle) {
      ctx.fillStyle = '#c8d0d8';
      ctx.font = UI_FONT_SMALL;
      ctx.fillText(this.subtitle, x + pad, ty);
      ty += lineH;
    }

    if (textLines.length) {
      ctx.fillStyle = '#ffffff';
      ctx.font = UI_FONT;
      for (const line of textLines) {
        ctx.fillText(line, x + pad, ty);
        ty += lineH;
      }
      ty += 4;
    }

    if (findingsLines.length) {
      ctx.fillStyle = '#3498db';
      ctx.font = UI_FONT_SMALL;
      for (const line of findingsLines) {
        ctx.fillText(line, x + pad + 2, ty);
        ty += 12;
      }
    }

    if (candCount) {
      ctx.fillStyle = '#2ecc71';
      ctx.font = UI_FONT_SMALL;
      for (let i = 0; i < candCount; i++) {
        ctx.fillText('→ ' + this.candidates[i], x + pad + 2, ty);
        ty += 12;
      }
      if (this.candidates.length > 4) {
        ctx.fillStyle = '#95a5a6';
        ctx.fillText(`  +${this.candidates.length - 4} more`, x + pad + 2, ty);
      }
    }

    ctx.restore();
    ctx.globalAlpha = 1;
  }
}

// ─── Leaderboard Panel ──────────────────────────────────────────

class LeaderboardPanel {
  constructor() {
    this.entries = [];
    this.visible = false;
    this.alpha = 0;
    this.flashTick = 0;
  }

  update(newLeaderboard, isNewBest) {
    if (!newLeaderboard || newLeaderboard.length === 0) return;
    const oldNames = new Set(this.entries.map(e => e.name));
    this.entries = newLeaderboard.map((e, i) => ({
      name: e.name,
      score: e.score,
      isNew: !oldNames.has(e.name),
      highlight: i === 0 && isNewBest,
    }));
    this.visible = true;
    this.flashTick = 40;
  }

  draw(ctx) {
    if (!this.visible) return;
    if (this.alpha < 1) this.alpha = Math.min(1, this.alpha + 0.05);
    if (this.flashTick > 0) this.flashTick--;

    ctx.globalAlpha = this.alpha;

    const w = 190;
    const x = CANVAS_W - w - 10;
    const y = 10;
    const entryH = 16;
    const headerH = 24;
    const shown = this.entries.slice(0, 8);
    const h = headerH + shown.length * entryH + 10;

    _drawPanel(ctx, x, y, w, h, 5);

    // Header
    ctx.fillStyle = '#f1c40f';
    ctx.font = UI_FONT_TITLE;
    ctx.textAlign = 'left';
    ctx.fillText('Leaderboard', x + 10, y + 18);

    for (let i = 0; i < shown.length; i++) {
      const e = shown[i];
      const ey = y + headerH + i * entryH + 10;

      // Highlight for new #1
      if (e.highlight) {
        const glowAlpha = 0.15 + (this.flashTick > 0 ? 0.1 * Math.sin(this.flashTick * 0.3) : 0);
        ctx.fillStyle = `rgba(243, 156, 18, ${glowAlpha})`;
        ctx.fillRect(x + 3, ey - 12, w - 6, entryH);
      }

      // New entry flash
      if (e.isNew && this.flashTick > 0) {
        const flash = 0.08 * (this.flashTick / 40);
        ctx.fillStyle = `rgba(46, 204, 113, ${flash})`;
        ctx.fillRect(x + 3, ey - 12, w - 6, entryH);
      }

      ctx.fillStyle = i === 0 ? '#f1c40f' : '#95a5a6';
      ctx.font = UI_FONT_SMALL;
      ctx.textAlign = 'left';
      ctx.fillText(`${i + 1}.`, x + 10, ey);

      ctx.fillStyle = e.isNew ? '#2ecc71' : '#ecf0f1';
      ctx.font = UI_FONT_SMALL;
      let name = e.name;
      if (name.length > 14) name = name.substring(0, 13) + '…';
      ctx.fillText(name, x + 28, ey);

      ctx.fillStyle = i === 0 ? '#f1c40f' : '#bdc3c7';
      ctx.textAlign = 'right';
      ctx.fillText(e.score.toFixed(3), x + w - 10, ey);
    }

    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  }
}

// ─── Cycle Counter + Progress ───────────────────────────────────

class ProgressUI {
  constructor() {
    this.cycle = 0;
    this.totalCycles = 4;
    this.sceneIndex = 0;
    this.totalScenes = 1;
  }

  draw(ctx) {
    if (this.cycle > 0) {
      _drawPanel(ctx, 10, 10, 120, 20, 4);
      ctx.fillStyle = '#f1c40f';
      ctx.font = UI_FONT_SMALL;
      ctx.textAlign = 'left';
      ctx.fillText(`Round ${this.cycle} of ${this.totalCycles}`, 18, 24);
    }

    // Progress bar with shimmer
    const barY = CANVAS_H - 4;
    const barW = CANVAS_W;
    const progress = this.totalScenes > 1 ? this.sceneIndex / (this.totalScenes - 1) : 0;
    ctx.fillStyle = 'rgba(30, 30, 50, 0.8)';
    ctx.fillRect(0, barY, barW, 4);

    const fillW = barW * progress;
    // Base fill
    ctx.fillStyle = '#f39c12';
    ctx.fillRect(0, barY, fillW, 4);

    // Shimmer sweep
    if (fillW > 10) {
      const tick = window.globalTick || 0;
      const shimmerPos = ((tick % 90) / 90) * fillW;
      const shimmerW = 30;
      const grad = ctx.createLinearGradient(shimmerPos - shimmerW, barY, shimmerPos + shimmerW, barY);
      grad.addColorStop(0, 'rgba(255, 220, 100, 0)');
      grad.addColorStop(0.5, 'rgba(255, 220, 100, 0.4)');
      grad.addColorStop(1, 'rgba(255, 220, 100, 0)');
      ctx.fillStyle = grad;
      ctx.save();
      ctx.beginPath();
      ctx.rect(0, barY, fillW, 4);
      ctx.clip();
      ctx.fillRect(shimmerPos - shimmerW, barY, shimmerW * 2, 4);
      ctx.restore();
    }
  }
}

// ─── Playback Controls ──────────────────────────────────────────

class PlaybackControls {
  constructor() {
    this.playing = true;
    this.speed = 1;
    this.buttons = [
      { label: '⏮', action: 'prev', x: CANVAS_W / 2 - 70, y: CANVAS_H - 28, w: 28, h: 22 },
      { label: '⏸', action: 'toggle', x: CANVAS_W / 2 - 26, y: CANVAS_H - 28, w: 52, h: 22 },
      { label: '⏭', action: 'next', x: CANVAS_W / 2 + 42, y: CANVAS_H - 28, w: 28, h: 22 },
      { label: '1x', action: 'speed', x: CANVAS_W / 2 + 82, y: CANVAS_H - 28, w: 40, h: 22 },
    ];
  }

  draw(ctx) {
    this.buttons[1].label = this.playing ? '⏸' : '▶';
    this.buttons[3].label = this.speed + 'x';

    for (const btn of this.buttons) {
      const grad = ctx.createLinearGradient(btn.x, btn.y, btn.x, btn.y + btn.h);
      grad.addColorStop(0, 'rgba(40, 30, 70, 0.9)');
      grad.addColorStop(1, 'rgba(25, 20, 50, 0.9)');
      ctx.fillStyle = grad;
      roundRect(ctx, btn.x, btn.y, btn.w, btn.h, 3);
      ctx.fill();
      ctx.strokeStyle = 'rgba(80, 60, 140, 0.4)';
      ctx.lineWidth = 0.5;
      roundRect(ctx, btn.x, btn.y, btn.w, btn.h, 3);
      ctx.stroke();
      // Glass highlight
      ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
      ctx.fillRect(btn.x + 1, btn.y + 1, btn.w - 2, 1);

      ctx.fillStyle = '#ecf0f1';
      ctx.font = UI_FONT_SMALL;
      ctx.textAlign = 'center';
      ctx.fillText(btn.label, btn.x + btn.w / 2, btn.y + 15);
    }

    // Mute indicator
    if (typeof SFX !== 'undefined' && SFX.muted) {
      ctx.fillStyle = '#e74c3c';
      ctx.font = UI_FONT_SMALL;
      ctx.textAlign = 'right';
      ctx.fillText('MUTED', CANVAS_W - 12, CANVAS_H - 14);
    }
    ctx.textAlign = 'left';
  }

  handleClick(cx, cy) {
    for (const btn of this.buttons) {
      if (cx >= btn.x && cx <= btn.x + btn.w && cy >= btn.y && cy <= btn.y + btn.h) {
        return btn.action;
      }
    }
    return null;
  }
}

// ─── Celebration Effect ─────────────────────────────────────────

class CelebrationEffect {
  constructor() {
    this.particles = [];
    this.active = false;
  }

  trigger() {
    this.active = true;
    this.particles = [];
    for (let i = 0; i < 60; i++) {
      this.particles.push({
        x: CANVAS_W / 2 + (Math.random() - 0.5) * 160,
        y: CANVAS_H / 2,
        px: 0, py: 0, // previous position for trails
        vx: (Math.random() - 0.5) * 5,
        vy: -Math.random() * 4 - 1.5,
        color: ['#f1c40f', '#e74c3c', '#2ecc71', '#3498db', '#9b59b6', '#22d3ee'][Math.floor(Math.random() * 6)],
        life: 70 + Math.random() * 50,
        size: 2 + Math.random() * 2.5,
        isCircle: Math.random() > 0.5,
      });
    }
  }

  update(speed) {
    if (!this.active) return;
    const spd = speed || 1;
    for (const p of this.particles) {
      p.px = p.x;
      p.py = p.y;
      p.x += p.vx * spd;
      p.y += p.vy * spd;
      p.vy += 0.06 * spd;
      p.life -= spd;
    }
    this.particles = this.particles.filter(p => p.life > 0);
    if (this.particles.length === 0) this.active = false;
  }

  draw(ctx) {
    if (!this.active) return;
    for (const p of this.particles) {
      // Trail
      if (p.px && p.py) {
        ctx.globalAlpha = Math.min(0.3, p.life / 30);
        ctx.fillStyle = p.color;
        ctx.fillRect(Math.round(p.px), Math.round(p.py), p.size * 0.7, p.size * 0.7);
      }
      // Main particle
      ctx.globalAlpha = Math.min(1, p.life / 20);
      ctx.fillStyle = p.color;
      if (p.isCircle) {
        ctx.beginPath();
        ctx.arc(Math.round(p.x), Math.round(p.y), p.size / 2, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillRect(Math.round(p.x), Math.round(p.y), p.size, p.size);
      }
    }
    ctx.globalAlpha = 1;
  }
}

// ─── Summary Overlay (finale results card) ──────────────────────

class SummaryOverlay {
  constructor() {
    this.visible = false;
    this.alpha = 0;
    this.data = null;
  }

  show(summary) {
    if (!summary) return;
    this.data = summary;
    this.visible = true;
  }

  hide() {
    this.visible = false;
    this.alpha = 0;
    this.data = null;
  }

  update(speed) {
    if (this.visible && this.alpha < 1) {
      this.alpha = Math.min(1, this.alpha + 0.03 * (speed || 1));
    }
  }

  draw(ctx) {
    if (!this.visible || !this.data || this.alpha <= 0) return;
    ctx.globalAlpha = this.alpha;

    const d = this.data;
    const w = 400;
    const h = 240;
    const x = (CANVAS_W - w) / 2;
    const y = (CANVAS_H - h) / 2 - 16;

    // Dim background
    ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

    // Card with animated border
    const tick = window.globalTick || 0;
    const borderPulse = 1.8 + 0.7 * Math.sin(tick * 0.06);

    const grad = ctx.createLinearGradient(x, y, x, y + h);
    grad.addColorStop(0, 'rgba(20, 16, 45, 0.97)');
    grad.addColorStop(1, 'rgba(10, 8, 22, 0.98)');
    ctx.fillStyle = grad;
    roundRect(ctx, x, y, w, h, 8);
    ctx.fill();
    ctx.strokeStyle = `rgba(241, 196, 15, ${0.4 + 0.15 * Math.sin(tick * 0.06)})`;
    ctx.lineWidth = borderPulse;
    roundRect(ctx, x, y, w, h, 8);
    ctx.stroke();
    // Glass highlight
    ctx.fillStyle = 'rgba(255, 255, 255, 0.04)';
    ctx.fillRect(x + 4, y + 2, w - 8, 1);

    let ty = y + 28;

    // Title with subtle glow
    ctx.save();
    ctx.shadowColor = 'rgba(241, 196, 15, 0.3)';
    ctx.shadowBlur = 10;
    ctx.fillStyle = '#f1c40f';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Experiment Results', CANVAS_W / 2, ty);
    ctx.restore();
    ty += 24;

    // Divider
    const divGrad = ctx.createLinearGradient(x + 20, 0, x + w - 20, 0);
    divGrad.addColorStop(0, 'rgba(241, 196, 15, 0)');
    divGrad.addColorStop(0.5, 'rgba(241, 196, 15, 0.4)');
    divGrad.addColorStop(1, 'rgba(241, 196, 15, 0)');
    ctx.fillStyle = divGrad;
    ctx.fillRect(x + 20, ty - 8, w - 40, 1);
    ty += 12;

    // Column headers
    ctx.font = '10px monospace';
    ctx.fillStyle = '#95a5a6';
    const colX = x + 20;
    const col1 = x + 170;
    const col2 = x + 260;
    const col3 = x + 350;
    ctx.textAlign = 'center';
    ctx.fillText('AUC', col1, ty);
    ctx.fillText('Top 20%', col2, ty);
    ctx.fillText('revenue captured', col3, ty);
    ty += 20;

    // Baseline row
    ctx.textAlign = 'left';
    ctx.fillStyle = '#95a5a6';
    ctx.font = '11px monospace';
    let bName = d.baseline.name;
    if (bName.length > 16) bName = bName.substring(0, 15) + '…';
    ctx.fillText(bName, colX, ty);
    ctx.textAlign = 'center';
    ctx.fillText(d.baseline.auc.toFixed(3), col1, ty);
    ctx.fillText((d.baseline.at_20 * 100).toFixed(1) + '%', col2, ty);
    ctx.fillText('$' + d.baseline.value_captured.toLocaleString(), col3, ty);
    ty += 10;
    ctx.fillStyle = '#666';
    ctx.font = '9px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('(baseline)', colX, ty);
    ty += 24;

    // Winner row with glow
    ctx.save();
    ctx.shadowColor = 'rgba(46, 204, 113, 0.2)';
    ctx.shadowBlur = 6;
    ctx.textAlign = 'left';
    ctx.fillStyle = '#2ecc71';
    ctx.font = 'bold 11px monospace';
    let wName = d.winner.name;
    if (wName.length > 16) wName = wName.substring(0, 15) + '…';
    ctx.fillText(wName, colX, ty);
    ctx.textAlign = 'center';
    ctx.fillText(d.winner.auc.toFixed(3), col1, ty);
    ctx.fillText((d.winner.at_20 * 100).toFixed(1) + '%', col2, ty);
    ctx.fillText('$' + d.winner.value_captured.toLocaleString(), col3, ty);
    ctx.restore();
    ty += 10;
    ctx.fillStyle = '#27ae60';
    ctx.font = '9px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('(winner)', colX, ty);
    ty += 30;

    // Divider
    ctx.fillStyle = divGrad;
    ctx.fillRect(x + 20, ty - 10, w - 40, 1);

    // Improvement headline with glow
    ctx.save();
    ctx.shadowColor = 'rgba(241, 196, 15, 0.4)';
    ctx.shadowBlur = 12;
    ctx.fillStyle = '#f1c40f';
    ctx.font = 'bold 13px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(
      '+$' + d.extra_revenue.toLocaleString() + ' additional quarterly revenue captured',
      CANVAS_W / 2, ty + 8
    );
    ctx.restore();
    ty += 22;

    ctx.fillStyle = '#bdc3c7';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(
      `+${d.improvement_pct}% improvement over baseline`,
      CANVAS_W / 2, ty + 4
    );

    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  }
}

// ─── Robot Portrait Strip (Hall of Fame) ─────────────────────────

class RobotPortraitStrip {
  constructor() {
    this.robots = []; // array of { cycleIndex, palette }
    this.maxVisible = 6;
  }

  addRobot(cycleIndex) {
    // Don't add duplicates
    if (this.robots.some(r => r.cycleIndex === cycleIndex)) return;
    const p = ROBOT_PALETTES[cycleIndex % ROBOT_PALETTES.length];
    this.robots.push({
      cycleIndex,
      palette: {
        ...p,
        outline: BASE_PALETTE[1],
        screen: BASE_PALETTE[2],
      },
    });
  }

  clear() {
    this.robots = [];
  }

  draw(ctx) {
    if (this.robots.length === 0) return;

    const startX = 12;
    const startY = 34;
    const portraitW = 22;
    const portraitH = 22;
    const gap = 3;
    const shown = this.robots.slice(-this.maxVisible);

    for (let i = 0; i < shown.length; i++) {
      const r = shown[i];
      const x = startX + i * (portraitW + gap);
      const y = startY;
      const isActive = i === shown.length - 1;

      // Background circle
      ctx.fillStyle = isActive ? 'rgba(40, 30, 70, 0.95)' : 'rgba(20, 16, 40, 0.85)';
      ctx.beginPath();
      ctx.arc(x + portraitW / 2, y + portraitH / 2, portraitW / 2 + 1, 0, Math.PI * 2);
      ctx.fill();

      // Active glow border
      if (isActive) {
        const rgb = this._hexToRgb(r.palette.eyes);
        const tick = window.globalTick || 0;
        const pulse = 0.5 + 0.3 * Math.sin(tick * 0.06);
        ctx.strokeStyle = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${pulse})`;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(x + portraitW / 2, y + portraitH / 2, portraitW / 2 + 1, 0, Math.PI * 2);
        ctx.stroke();
      } else {
        ctx.strokeStyle = 'rgba(80, 60, 140, 0.3)';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.arc(x + portraitW / 2, y + portraitH / 2, portraitW / 2 + 1, 0, Math.PI * 2);
        ctx.stroke();
      }

      // Draw mini robot head (rows 0-8 of sprite, scaled down)
      this._drawMiniHead(ctx, x + 3, y + 2, r.palette);

      // Past robots get slight dim
      if (!isActive) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
        ctx.beginPath();
        ctx.arc(x + portraitW / 2, y + portraitH / 2, portraitW / 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  _drawMiniHead(ctx, px, py, palette) {
    // Draw rows 0-8 of SPRITE_DOWN_0 at ~1x scale (16 pixels wide → 16px)
    const headRows = SPRITE_DOWN_0.slice(0, 9);
    const scale = 1.1;
    const headPalette = [
      null,
      palette.outline,
      palette.screen,
      palette.body,
      null,
      null,
      palette.eyes,
      palette.antenna,
      palette.accent || palette.body,
    ];

    for (let r = 0; r < headRows.length; r++) {
      for (let c = 0; c < 16; c++) {
        const val = headRows[r][c];
        if (val === 0 || !headPalette[val]) continue;
        ctx.fillStyle = headPalette[val];
        const sx = Math.round(px + c * scale);
        const sy = Math.round(py + r * scale);
        const sw = Math.max(1, Math.round(px + (c + 1) * scale) - sx);
        const sh = Math.max(1, Math.round(py + (r + 1) * scale) - sy);
        ctx.fillRect(sx, sy, sw, sh);
      }
    }
  }

  _hexToRgb(hex) {
    const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return result ? {
      r: parseInt(result[1], 16),
      g: parseInt(result[2], 16),
      b: parseInt(result[3], 16),
    } : { r: 34, g: 211, b: 238 };
  }
}

// ─── Helpers ────────────────────────────────────────────────────

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function wrapText(ctx, text, maxWidth, maxLines) {
  maxLines = maxLines || 5;
  const words = text.split(' ');
  const lines = [];
  let current = '';
  for (const word of words) {
    const test = current ? current + ' ' + word : word;
    if (ctx.measureText(test).width > maxWidth && current) {
      lines.push(current);
      current = word;
      if (lines.length >= maxLines) break;
    } else {
      current = test;
    }
  }
  if (current && lines.length < maxLines) lines.push(current);
  if (lines.length >= maxLines && current && lines[lines.length - 1] !== current) {
    const last = lines[lines.length - 1];
    if (ctx.measureText(last + '…').width <= maxWidth) {
      lines[lines.length - 1] = last + '…';
    }
  }
  return lines;
}


// === script.js ===
// Scene sequencer — drives the animation from script.json data

const SCENE_STATE = {
  WALKING: 'walking',
  ACTIVE: 'active',
  TRANSITION: 'transition',
  ROBOT_SWAP: 'robot_swap',
};

const STATION_ACTIONS = {
  desk: CharState.READ,
  library: CharState.READ,
  lab: CharState.TYPE,
  whiteboard: CharState.WRITE,
  center: CharState.THINK,
};

const SPEECH_LINES = {
  intro:      ["Let's do this!", "Ooh, a new challenge!", "Time to science!"],
  hypothesis: ["I have a plan!", "What if we try...", "Hmm, let me think...", "Big brain time!"],
  research:   ["So many books!", "Fascinating...", "Ooh, interesting!", "Knowledge is power!"],
  training:   ["Beep boop!", "Crunching numbers...", "Go, models, go!", "*intense computing*"],
  evaluation: ["Drumroll please!", "And the winner is...", "Let's see the scores!", "The moment of truth!"],
  dance:      ["WOOHOO!", "New record!", "I'm the best!", "Dance time!", "Yesss!"],
  finale:     ["We did it!", "Mission complete!", "GG!", "That was fun!"],
  journal:    ["Writing it down!", "Dear diary...", "For the next agent!", "Noting my findings..."],
  arrive:     ["Reporting for duty!", "Let's pick up where they left off!", "New agent online!", "I've read the journal!"],
  depart:     ["My work here is done!", "Tag, you're it!", "Good luck, next agent!", "Signing off!"],
};

class ScenePlayer {
  constructor(scriptData, character, textOverlay, leaderboard, progressUI, celebration, summary, portraits) {
    this.scenes = scriptData.scenes || [];
    this.character = character;
    this.overlay = textOverlay;
    this.leaderboard = leaderboard;
    this.progress = progressUI;
    this.celebration = celebration;
    this.summary = summary;
    this.portraits = portraits || null;

    this.sceneIndex = 0;
    this.state = SCENE_STATE.TRANSITION;
    this.timer = 0;
    this.paused = false;
    this.speed = 1;
    this.currentCycle = 0;

    this.progress.totalScenes = this.scenes.length;
    this.progress.totalCycles = scriptData.total_cycles || 4;

    // Start first scene after a beat
    this.timer = 30;
  }

  get currentScene() {
    return this.scenes[this.sceneIndex] || null;
  }

  sceneDuration(scene) {
    if (!scene) return 150;
    // Proportional to text: ~1.25s per 15 words, min ~3.75s
    // (0.8x speed = 1.25x duration, walking stays normal)
    const words = (scene.text || '').split(' ').length
      + (scene.findings || []).join(' ').split(' ').length
      + (scene.candidates || []).length * 2;
    const baseTicks = Math.max(129, Math.ceil(words / 15 * 43));
    if (scene.type === 'intro') return Math.max(baseTicks, 259);
    if (scene.type === 'finale') return Math.max(baseTicks, 301);
    if (scene.type === 'evaluation') return Math.max(baseTicks, 215);
    return baseTicks;
  }

  update() {
    if (this.paused) return;

    const speedTicks = this.speed;

    if (this.state === SCENE_STATE.TRANSITION) {
      this.timer -= speedTicks;
      if (this.timer <= 0) {
        this._startScene();
      }
      return;
    }

    if (this.state === SCENE_STATE.WALKING) {
      return;
    }

    if (this.state === SCENE_STATE.ROBOT_SWAP) {
      // Animation is driven by character's teleport state — just wait
      return;
    }

    if (this.state === SCENE_STATE.ACTIVE) {
      this.timer -= speedTicks;
      if (this.timer <= 0) {
        this._endScene();
      }
    }
  }

  _startScene() {
    const scene = this.currentScene;
    if (!scene) return;

    this.progress.sceneIndex = this.sceneIndex;
    if (scene.cycle) this.progress.cycle = scene.cycle;

    // Cycle boundary detection — trigger robot swap animation
    if (scene.cycle && scene.cycle !== this.currentCycle && this.currentCycle > 0) {
      this.state = SCENE_STATE.ROBOT_SWAP;
      this.overlay.hide();
      this.summary.hide();

      const departLines = SPEECH_LINES.depart || [];
      this.character.speechText = departLines[Math.floor(Math.random() * departLines.length)] || '';

      SFX.depart();
      this.character.startDepart(() => {
        // Switch palette to new cycle
        this.character.setPalette(scene.cycle - 1); // 0-indexed palette

        // Teleport to desk for dramatic entrance
        const desk = STATIONS['desk'];
        if (desk) {
          this.character.tileX = desk.stand[0];
          this.character.tileY = desk.stand[1];
          this.character.pixelX = desk.stand[0] * TILE;
          this.character.pixelY = desk.stand[1] * TILE;
        }

        SFX.spawn();
        this.character.startSpawn(() => {
          this.currentCycle = scene.cycle;

          // Add portrait for new agent
          if (this.portraits) {
            this.portraits.addRobot(scene.cycle - 1);
          }

          const arriveLines = SPEECH_LINES.arrive || [];
          this.character.speechText = arriveLines[Math.floor(Math.random() * arriveLines.length)] || '';

          // Resume normal scene flow
          this._startScene();
        });
      });
      return;
    }

    // First cycle — set palette silently
    if (scene.cycle && this.currentCycle === 0) {
      this.currentCycle = scene.cycle;
      this.character.setPalette(scene.cycle - 1);
      if (this.portraits) {
        this.portraits.addRobot(scene.cycle - 1);
      }
    }

    // Play scene-type sound effect
    if (scene.type === 'intro') SFX.intro();
    else if (scene.type === 'hypothesis') SFX.hypothesis();
    else if (scene.type === 'training') SFX.training();
    else if (scene.type === 'evaluation') SFX.evaluation();
    else if (scene.type === 'finale') SFX.finale();
    else SFX.sceneTransition();

    const station = STATIONS[scene.station];
    if (!station) {
      this._onArrived();
      return;
    }

    const [tx, ty] = station.stand;
    if (this.character.tileX === tx && this.character.tileY === ty) {
      this._onArrived();
    } else {
      this.state = SCENE_STATE.WALKING;
      this.overlay.hide();
      this.summary.hide();
      this.character.speechText = '';
      this.character.walkTo(tx, ty, () => this._onArrived());
    }
  }

  _onArrived() {
    const scene = this.currentScene;
    if (!scene) return;

    this.state = SCENE_STATE.ACTIVE;
    this.timer = this.sceneDuration(scene);

    // Set character action + speech (journal scenes override to TYPE for writing)
    this.character.state = scene.type === 'journal'
      ? CharState.TYPE
      : (STATION_ACTIONS[scene.station] || CharState.IDLE);
    const lines = SPEECH_LINES[scene.type] || [];
    this.character.speechText = lines.length ? lines[Math.floor(Math.random() * lines.length)] : '';

    // Show text overlay
    this.overlay.show(scene);

    // Update leaderboard on evaluation scenes
    if (scene.type === 'evaluation' && scene.leaderboard) {
      this.leaderboard.update(scene.leaderboard, scene.is_new_best);
      if (scene.is_new_best) {
        SFX.newBest();
        this.celebration.trigger();
        // Dance! Then return to normal action
        const danceLines = SPEECH_LINES.dance || [];
        this.character.speechText = danceLines.length ? danceLines[Math.floor(Math.random() * danceLines.length)] : 'WOOHOO!';
        const normalAction = STATION_ACTIONS[scene.station] || CharState.IDLE;
        this.character.startDance(() => {
          this.character.state = normalAction;
        });
      }
    }

    // Finale — show full leaderboard + summary
    if (scene.type === 'finale' && scene.leaderboard) {
      this.leaderboard.update(scene.leaderboard, false);
    }
    if (scene.type === 'finale' && scene.summary) {
      this.summary.show(scene.summary);
    }
  }

  _endScene() {
    this.overlay.hide();
    this.character.state = CharState.IDLE;
    this.character.speechText = '';
    this.sceneIndex++;

    if (this.sceneIndex >= this.scenes.length) {
      this.sceneIndex = this.scenes.length - 1;
      this.state = SCENE_STATE.ACTIVE;
      this.paused = true;
      return;
    }

    this.state = SCENE_STATE.TRANSITION;
    this.timer = 20;
  }

  nextScene() {
    if (this.sceneIndex < this.scenes.length - 1) {
      this.overlay.hide();
      this.character.state = CharState.IDLE;
      this.sceneIndex++;
      this._rebuildState();
      this.state = SCENE_STATE.TRANSITION;
      this.timer = 5;
      this.paused = false;
    }
  }

  prevScene() {
    if (this.sceneIndex > 0) {
      this.overlay.hide();
      this.character.state = CharState.IDLE;

      this.sceneIndex--;
      this._rebuildState();
      this.state = SCENE_STATE.TRANSITION;
      this.timer = 5;
      this.paused = false;
    }
  }

  _rebuildState() {
    let lastLeaderboard = null;
    let lastCycle = 0;

    // Also rebuild portrait strip
    if (this.portraits) this.portraits.clear();

    for (let i = 0; i <= this.sceneIndex; i++) {
      const s = this.scenes[i];
      if (s.type === 'evaluation' && s.leaderboard) lastLeaderboard = s.leaderboard;
      if (s.type === 'finale' && s.leaderboard) lastLeaderboard = s.leaderboard;
      if (s.cycle && s.cycle !== lastCycle) {
        lastCycle = s.cycle;
        if (this.portraits) this.portraits.addRobot(s.cycle - 1);
      }
    }

    if (lastLeaderboard) {
      this.leaderboard.update(lastLeaderboard, false);
    } else {
      this.leaderboard.entries = [];
      this.leaderboard.visible = false;
    }

    // Restore palette for current cycle (instant, no animation)
    this.currentCycle = lastCycle;
    if (lastCycle > 0) {
      this.character.setPalette(lastCycle - 1);
    }
    // Cancel any in-progress teleport
    this.character.isDeparting = false;
    this.character.isSpawning = false;
    this.character.teleportParticles = [];
  }

  togglePause() {
    this.paused = !this.paused;
  }

  cycleSpeed() {
    const speeds = [1, 1.25, 1.5, 2, 4];
    const idx = speeds.indexOf(this.speed);
    this.speed = speeds[(idx + 1) % speeds.length];
  }
}


// === engine.js ===
// Game engine — main loop, canvas setup, input handling

(function () {
  'use strict';

  const W = 600;
  const H = 400;
  const SCALE = 2;

  let canvas, ctx;
  let character, overlay, leaderboard, progressUI, controls, celebration, summary, portraits;
  let player;
  let scriptData = null;

  function init() {
    canvas = document.getElementById('game');
    canvas.width = W;
    canvas.height = H;
    canvas.style.width = W * SCALE + 'px';
    canvas.style.height = H * SCALE + 'px';
    canvas.style.imageRendering = 'pixelated';
    ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    // Load script data from embedded element or window
    const scriptEl = document.getElementById('script-data');
    if (scriptEl) {
      scriptData = JSON.parse(scriptEl.textContent);
    } else if (window.SCRIPT_DATA) {
      scriptData = window.SCRIPT_DATA;
    }

    if (!scriptData) {
      ctx.fillStyle = '#ecf0f1';
      ctx.font = '14px monospace';
      ctx.fillText('No script data loaded.', 20, H / 2);
      ctx.fillText('Run: python viz/generate.py experiments/<id>', 20, H / 2 + 20);
      return;
    }

    // Initialize game objects
    const startStation = STATIONS['desk'] || STATIONS['center'];
    const [sx, sy] = startStation ? startStation.stand : [7, 4];
    character = new Character(sx, sy);
    overlay = new TextOverlay();
    leaderboard = new LeaderboardPanel();
    progressUI = new ProgressUI();
    controls = new PlaybackControls();
    celebration = new CelebrationEffect();
    summary = new SummaryOverlay();
    portraits = new RobotPortraitStrip();

    player = new ScenePlayer(scriptData, character, overlay, leaderboard, progressUI, celebration, summary, portraits);

    // Title
    const titleEl = document.getElementById('title');
    if (titleEl && scriptData.experiment) {
      titleEl.textContent = scriptData.experiment.name || 'Experiment Replay';
    }

    // Input
    canvas.addEventListener('click', handleClick);
    document.addEventListener('keydown', handleKey);

    // Start loop
    requestAnimationFrame(gameLoop);
  }

  let lastTime = 0;
  const FPS = 30;
  const FRAME_MS = 1000 / FPS;

  function gameLoop(timestamp) {
    requestAnimationFrame(gameLoop);

    const delta = timestamp - lastTime;
    if (delta < FRAME_MS) return;
    lastTime = timestamp - (delta % FRAME_MS);

    update();
    draw();
  }

  function update() {
    if (!player) return;
    const spd = player.speed;
    window.globalTick = (window.globalTick || 0) + spd;
    character.update(spd);
    overlay.update(spd);
    celebration.update(spd);
    summary.update(spd);
    player.update();
    controls.playing = !player.paused;
    controls.speed = spd;
  }

  function draw() {
    if (!player) return;
    ctx.clearRect(0, 0, W, H);

    drawRoom(ctx);
    character.draw(ctx);

    overlay.draw(ctx);
    leaderboard.draw(ctx);
    progressUI.draw(ctx);
    portraits.draw(ctx);
    controls.draw(ctx);
    celebration.draw(ctx);
    summary.draw(ctx);
  }

  function handleClick(e) {
    const rect = canvas.getBoundingClientRect();
    const cx = (e.clientX - rect.left) / SCALE;
    const cy = (e.clientY - rect.top) / SCALE;

    const action = controls.handleClick(cx, cy);
    if (action === 'toggle') player.togglePause();
    else if (action === 'next') player.nextScene();
    else if (action === 'prev') player.prevScene();
    else if (action === 'speed') player.cycleSpeed();
  }

  function handleKey(e) {
    if (!player) return;
    if (e.code === 'Space') { e.preventDefault(); player.togglePause(); }
    else if (e.code === 'ArrowRight') player.nextScene();
    else if (e.code === 'ArrowLeft') player.prevScene();
    else if (e.code === 'KeyS') player.cycleSpeed();
    else if (e.code === 'KeyM') SFX.toggleMute();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

</script>
